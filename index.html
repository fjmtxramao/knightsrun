<!DOCTYPE html>
<html lang="pt-BR">
<head>
 <link rel="manifest" href="/knightsrun/manifest.json"> 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knight's Run – A Corrida Medieval</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=MedievalSharp&family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');

  :root {
    --gold: #f0c040;
    --gold-dark: #b8860b;
    --crimson: #8b0000;
    --sky1: #1a0a2e;
    --sky2: #2d1b4e;
    --ground: #3d2808;
    --ground2: #5a3d10;
    --grass: #2d5a1b;
    --grass2: #4a8a2a;
    --stone: #5a5040;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0514;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Cinzel', serif;
    overflow: hidden;
    user-select: none;
  }

  #game-wrapper {
    position: relative;
    width: 800px;
    max-width: 100vw;
  }

  #title-screen {
    position: absolute;
    inset: 0;
    background: linear-gradient(160deg, #0a0514 0%, #1a0a2e 50%, #0d0820 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    border: 2px solid var(--gold-dark);
    border-radius: 8px;
    gap: 18px;
  }

  #title-screen h1 {
    font-family: 'Cinzel', serif;
    font-size: 3rem;
    font-weight: 900;
    color: var(--gold);
    text-shadow: 0 0 30px #f0c04088, 2px 2px 0 #5a3000;
    letter-spacing: 4px;
    text-align: center;
    line-height: 1.1;
  }

  #title-screen h1 span {
    color: #fff;
    font-size: 1.4rem;
    display: block;
    letter-spacing: 8px;
    text-shadow: 0 0 10px #ffffff44;
    font-weight: 400;
  }

  .title-divider {
    width: 300px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .title-info {
    font-family: 'Crimson Text', serif;
    font-size: 1.1rem;
    color: #ccc;
    text-align: center;
    line-height: 1.9;
    max-width: 440px;
  }

  .title-info b { color: var(--gold); font-style: italic; }

  #start-btn {
    margin-top: 10px;
    padding: 14px 50px;
    background: linear-gradient(135deg, #8b0000, #c0392b);
    color: var(--gold);
    border: 2px solid var(--gold-dark);
    font-family: 'Cinzel', serif;
    font-size: 1.2rem;
    font-weight: 700;
    letter-spacing: 3px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
    box-shadow: 0 4px 20px #8b000088;
    text-transform: uppercase;
  }
  #start-btn:hover { background: linear-gradient(135deg, #c0392b, #e74c3c); transform: scale(1.05); }

  .controls-hint {
    font-family: 'Crimson Text', serif;
    font-size: 0.9rem;
    color: #888;
    letter-spacing: 1px;
  }

  canvas {
    display: block;
    border: 2px solid var(--gold-dark);
    border-radius: 8px;
    box-shadow: 0 0 60px #f0c04022, 0 0 120px #8b000033;
  }

  #hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 16px;
    background: linear-gradient(90deg, #0d0820, #1a0a2e, #0d0820);
    border: 1px solid var(--gold-dark);
    border-bottom: none;
    border-radius: 8px 8px 0 0;
    font-size: 0.95rem;
    color: var(--gold);
    letter-spacing: 2px;
  }

  #hud .lives { color: #e74c3c; font-size: 1.1rem; letter-spacing: 4px; }
  #hud .level { color: #aaa; font-size: 0.8rem; }

  #game-over-screen {
    position: absolute;
    inset: 0;
    background: #000000cc;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    gap: 16px;
    border-radius: 8px;
  }

  #game-over-screen h2 {
    font-size: 2.8rem;
    color: var(--crimson);
    text-shadow: 0 0 20px #8b0000, 2px 2px 0 #000;
    letter-spacing: 4px;
  }

  #game-over-screen .final-score {
    font-size: 1.3rem;
    color: var(--gold);
  }

  #game-over-screen .best-score {
    font-size: 1rem;
    color: #aaa;
    font-family: 'Crimson Text', serif;
  }

  #restart-btn {
    padding: 12px 44px;
    background: linear-gradient(135deg, #8b0000, #c0392b);
    color: var(--gold);
    border: 2px solid var(--gold-dark);
    font-family: 'Cinzel', serif;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 3px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
    box-shadow: 0 4px 20px #8b000088;
  }
  #restart-btn:hover { transform: scale(1.05); }

  #pause-hint {
    position: absolute;
    bottom: 12px;
    right: 16px;
    font-family: 'Crimson Text', serif;
    font-size: 0.8rem;
    color: #555;
    z-index: 10;
  }
</style>
</head>
<body>

<div id="game-wrapper">
  <div id="hud">
    <div>⚔️ <span id="score-display">0</span> pts</div>
    <div class="level">FASE <span id="level-display">1</span></div>
    <div class="lives" id="lives-display">❤️❤️❤️</div>
  </div>

  <div style="position:relative;">
    <canvas id="canvas" width="800" height="300"></canvas>

    <div id="title-screen">
      <h1><span>⚔ A CORRIDA DE</span>KNIGHT'S RUN</h1>
      <div class="title-divider"></div>
      <div class="title-info">
        Corra pelo reino medieval!<br>
        <b>🍎 Frutas</b> — colete para ganhar pontos<br>
        <b>🍄 Cogumelos</b> — venenosos, evite-os!<br>
        <b>🪨 Pedras &amp; Tochas</b> — pule os obstáculos<br>
      </div>
      <button id="start-btn" onclick="startGame()">⚔ INICIAR JORNADA</button>
      <div class="controls-hint">[ ESPAÇO / SETA ↑ / TOQUE ] para pular</div>
    </div>

    <div id="game-over-screen">
      <h2>☠ DERROTADO ☠</h2>
      <div class="final-score">Pontuação: <span id="final-score">0</span></div>
      <div class="best-score">Melhor: <span id="best-score">0</span></div>
      <button id="restart-btn" onclick="startGame()">↺ TENTAR NOVAMENTE</button>
    </div>
  </div>
  <div id="pause-hint">P = pausar</div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ── State ──────────────────────────────────────────────────────
let state, score, bestScore = 0, lives, level, frame, speed, spawnTimer, paused, gameRunning;

// ── Player ────────────────────────────────────────────────────
const GROUND_Y = H - 60;
let player = {};
function resetPlayer() {
  player = { x: 90, y: GROUND_Y, w: 38, h: 54, vy: 0, jumping: false, doubleJump: false, frame: 0, frameTimer: 0, invincible: 0, dead: false };
}

// ── Entities ──────────────────────────────────────────────────
let entities = [];

// ── BG Layers ─────────────────────────────────────────────────
let bgStars = Array.from({length:60}, () => ({x: Math.random()*W, y: Math.random()*(H*0.55), r: Math.random()*1.5+0.3, blink: Math.random()*200}));
let bgTrees = Array.from({length:8}, (_, i) => ({x: i*110+50, h: 50+Math.random()*40}));
let bgCastle = {x: W*0.72};
let bgClouds = [{x:100,y:40,w:120},{x:350,y:25,w:90},{x:600,y:55,w:140}];

function startGame() {
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('game-over-screen').style.display = 'none';
  state = 'playing';
  score = 0; lives = 3; level = 1; frame = 0; speed = 4; spawnTimer = 0; paused = false; gameRunning = true;
  entities = [];
  resetPlayer();
  updateHUD();
  if (!animRunning) { animRunning = true; requestAnimationFrame(loop); }
}

function updateHUD() {
  document.getElementById('score-display').textContent = score;
  document.getElementById('level-display').textContent = level;
  let h = '';
  for (let i=0;i<3;i++) h += i < lives ? '❤️' : '🖤';
  document.getElementById('lives-display').textContent = h;
}

// ── Input ─────────────────────────────────────────────────────
function jump() {
  if (state !== 'playing' || paused) return;
  if (!player.jumping) { player.vy = -14; player.jumping = true; player.doubleJump = false; }
  else if (!player.doubleJump) { player.vy = -12; player.doubleJump = true; }
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); jump(); }
  if (e.code === 'KeyP') paused = !paused;
});
canvas.addEventListener('click', jump);
canvas.addEventListener('touchstart', e => { e.preventDefault(); jump(); }, {passive:false});

// ── Spawn ─────────────────────────────────────────────────────
const FRUITS = ['🍎','🍊','🍋','🍇','🫐','🍓'];
const FRUIT_PTS = [10,15,20,25,30,35];

function spawnEntity() {
  const r = Math.random();
  // Obstacle: rock, torch, fence
  if (r < 0.38) {
    const type = Math.random() < 0.5 ? 'rock' : (Math.random() < 0.5 ? 'torch' : 'fence');
    entities.push({kind:'obstacle', type, x: W+20, y: GROUND_Y, w:30, h: type==='fence'?44:36 });
  }
  // Mushroom
  else if (r < 0.62) {
    entities.push({kind:'mushroom', x: W+20, y: GROUND_Y, w:30, h:32});
  }
  // Fruit (airborne or ground)
  else {
    const i = Math.floor(Math.random()*FRUITS.length);
    const airborne = Math.random() < 0.45;
    const yPos = airborne ? GROUND_Y - 70 - Math.random()*60 : GROUND_Y + 4;
    entities.push({kind:'fruit', emoji: FRUITS[i], pts: FRUIT_PTS[i], x: W+20, y: yPos, w:28, h:28});
  }
}

// ── Collision ─────────────────────────────────────────────────
function rectOverlap(a, b, pad=6) {
  return a.x+pad < b.x+b.w-pad && a.x+a.w-pad > b.x+pad && a.y+pad < b.y+b.h-pad && a.y+a.h-pad > b.y+pad;
}

// ── Draw helpers ──────────────────────────────────────────────
function drawSky() {
  const grad = ctx.createLinearGradient(0,0,0,H*0.65);
  grad.addColorStop(0,'#0a0514');
  grad.addColorStop(0.5,'#1a0a2e');
  grad.addColorStop(1,'#2d1040');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H*0.65);
}

function drawStars() {
  bgStars.forEach(s => {
    const bright = 0.5 + 0.5*Math.sin((frame+s.blink)*0.03);
    ctx.fillStyle = `rgba(255,255,240,${bright*0.9})`;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
  });
}

function drawMoon() {
  ctx.save();
  ctx.shadowColor = '#ffffaa'; ctx.shadowBlur = 30;
  ctx.fillStyle = '#fffde0';
  ctx.beginPath(); ctx.arc(W*0.85, 45, 28, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#1a0a2e';
  ctx.beginPath(); ctx.arc(W*0.85+10, 38, 22, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawClouds() {
  bgClouds.forEach(c => {
    c.x -= speed * 0.15;
    if (c.x + c.w < 0) c.x = W + c.w;
    ctx.fillStyle = 'rgba(180,150,220,0.18)';
    ctx.beginPath(); ctx.ellipse(c.x, c.y, c.w/2, 18, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(c.x-20, c.y+6, c.w/3, 14, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(c.x+25, c.y+8, c.w/3.5, 12, 0, 0, Math.PI*2); ctx.fill();
  });
}

function drawCastle() {
  bgCastle.x -= speed * 0.08;
  if (bgCastle.x < -120) bgCastle.x = W + 120;
  const cx = bgCastle.x, baseY = H*0.65-2;
  ctx.fillStyle = '#2a2030';
  ctx.fillRect(cx-30, baseY-70, 60, 70);
  // towers
  [[cx-38,80],[cx+38,80],[cx-12,95],[cx+12,95]].forEach(([tx,th])=>{
    ctx.fillStyle = '#222028'; ctx.fillRect(tx-10, baseY-th, 20, th);
    ctx.fillStyle = '#3a2d48';
    for(let m=0;m<3;m++) ctx.fillRect(tx-10+m*7, baseY-th-8, 5, 8);
  });
  ctx.fillStyle = '#1a1020'; ctx.fillRect(cx-6, baseY-30, 12, 30); // gate
  // flag
  ctx.strokeStyle='#8b0000'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(cx,baseY-95); ctx.lineTo(cx,baseY-110); ctx.stroke();
  ctx.fillStyle='#c0392b';
  ctx.beginPath(); ctx.moveTo(cx,baseY-110); ctx.lineTo(cx+14,baseY-104); ctx.lineTo(cx,baseY-98); ctx.fill();
}

function drawTrees() {
  bgTrees.forEach(t => {
    t.x -= speed * 0.25;
    if (t.x < -30) t.x = W + 30;
    const ty = H*0.65;
    ctx.fillStyle='#1a1010'; ctx.fillRect(t.x-4, ty-t.h, 8, t.h);
    ctx.fillStyle='#0d1a08';
    ctx.beginPath(); ctx.moveTo(t.x,ty-t.h-30); ctx.lineTo(t.x-18,ty-t.h+10); ctx.lineTo(t.x+18,ty-t.h+10); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#112208';
    ctx.beginPath(); ctx.moveTo(t.x,ty-t.h-50); ctx.lineTo(t.x-14,ty-t.h-15); ctx.lineTo(t.x+14,ty-t.h-15); ctx.closePath(); ctx.fill();
  });
}

function drawGround() {
  // base ground
  const ggrad = ctx.createLinearGradient(0,H*0.65,0,H);
  ggrad.addColorStop(0,'#3d2808'); ggrad.addColorStop(1,'#1a0f00');
  ctx.fillStyle = ggrad; ctx.fillRect(0, H*0.65, W, H*0.35);
  // grass strip
  ctx.fillStyle='#2d5a1b'; ctx.fillRect(0,H*0.65-6,W,14);
  ctx.fillStyle='#4a8a2a'; ctx.fillRect(0,H*0.65-8,W,5);
  // cobblestone texture
  ctx.strokeStyle='rgba(0,0,0,0.25)'; ctx.lineWidth=1;
  for(let bx=0;bx<W;bx+=40) { ctx.beginPath(); ctx.moveTo(bx,H*0.65+14); ctx.lineTo(bx,H); ctx.stroke(); }
  for(let by=H*0.65+14;by<H;by+=20) { ctx.beginPath(); ctx.moveTo(0,by); ctx.lineTo(W,by); ctx.stroke(); }
}

function drawRock(e) {
  ctx.fillStyle = '#6a5a40';
  ctx.beginPath(); ctx.ellipse(e.x+e.w/2, e.y+e.h-4, e.w/2, e.h*0.45, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#8a7a55';
  ctx.beginPath(); ctx.ellipse(e.x+e.w/2-2, e.y+e.h*0.4, e.w/2-4, e.h*0.38, -0.2, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#a09070';
  ctx.beginPath(); ctx.ellipse(e.x+e.w/2-4, e.y+e.h*0.35, 6, 5, 0, 0, Math.PI*2); ctx.fill();
}

function drawTorch(e) {
  ctx.fillStyle='#6a4a20';
  ctx.fillRect(e.x+e.w/2-3, e.y+10, 6, e.h-10);
  ctx.fillStyle='#c06020';
  ctx.fillRect(e.x+e.w/2-5, e.y+6, 10, 10);
  // flame
  const flicker = Math.sin(frame*0.3)*3;
  const fgrad = ctx.createRadialGradient(e.x+e.w/2,e.y+2,0,e.x+e.w/2,e.y+2,14);
  fgrad.addColorStop(0,'rgba(255,255,100,0.95)');
  fgrad.addColorStop(0.4,'rgba(255,140,0,0.8)');
  fgrad.addColorStop(1,'rgba(255,0,0,0)');
  ctx.fillStyle=fgrad;
  ctx.beginPath(); ctx.ellipse(e.x+e.w/2, e.y+flicker, 8, 14, 0, 0, Math.PI*2); ctx.fill();
  // glow
  ctx.save(); ctx.shadowColor='#ff8800'; ctx.shadowBlur=18;
  ctx.fillStyle='rgba(255,180,0,0.4)';
  ctx.beginPath(); ctx.arc(e.x+e.w/2, e.y+4, 10, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawFence(e) {
  ctx.strokeStyle='#7a5520'; ctx.lineWidth=3;
  ctx.strokeRect(e.x+2, e.y+4, e.w-4, e.h-4);
  ctx.beginPath(); ctx.moveTo(e.x+2,e.y+4); ctx.lineTo(e.x+e.w-2,e.y+e.h-4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(e.x+e.w-2,e.y+4); ctx.lineTo(e.x+2,e.y+e.h-4); ctx.stroke();
  for(let p=0;p<4;p++) {
    const px=e.x+4+p*((e.w-8)/3);
    ctx.fillStyle='#8a6030';
    ctx.beginPath(); ctx.moveTo(px,e.y); ctx.lineTo(px-4,e.y+8); ctx.lineTo(px+4,e.y+8); ctx.closePath(); ctx.fill();
    ctx.fillRect(px-2.5,e.y+8,5,e.h-8);
  }
}

function drawMushroom(e) {
  // stem
  ctx.fillStyle='#e8d8b0';
  ctx.beginPath(); ctx.ellipse(e.x+e.w/2, e.y+e.h-4, 7, 10, 0, 0, Math.PI*2); ctx.fill();
  // cap
  ctx.fillStyle='#8b0000';
  ctx.beginPath(); ctx.arc(e.x+e.w/2, e.y+12, e.w/2, Math.PI, 0); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#a00000';
  ctx.beginPath(); ctx.arc(e.x+e.w/2, e.y+12, e.w/2-2, Math.PI+0.1, -0.1); ctx.closePath(); ctx.fill();
  // spots
  ctx.fillStyle='rgba(255,255,255,0.85)';
  [[0,-6,4],[9,0,3],[-9,1,3],[3,3,3]].forEach(([dx,dy,r])=>{
    ctx.beginPath(); ctx.arc(e.x+e.w/2+dx, e.y+12+dy, r, 0, Math.PI*2); ctx.fill();
  });
  // ☠ skull
  ctx.font='10px serif'; ctx.fillStyle='rgba(0,0,0,0.7)';
  ctx.fillText('☠',e.x+e.w/2-5,e.y+16);
}

function drawFruit(e) {
  ctx.font=`${e.w}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(e.emoji, e.x+e.w/2, e.y+e.h/2+2);
  // point label
  ctx.font='bold 9px Cinzel, serif'; ctx.fillStyle='#f0c040';
  ctx.fillText('+'+e.pts, e.x+e.w/2, e.y-6);
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
}

function drawPlayer() {
  const px=player.x, py=player.y, pw=player.w, ph=player.h;
  ctx.save();
  // Flash if invincible
  if (player.invincible > 0 && Math.floor(frame/5)%2===0) { ctx.globalAlpha=0.4; }

  const legOff = player.jumping ? 0 : Math.sin(frame*0.22)*5;
  const armOff = player.jumping ? -8 : Math.sin(frame*0.22)*6;
  const bodyBob = player.jumping ? 0 : Math.abs(Math.sin(frame*0.22))*2;

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(px+pw/2, GROUND_Y+ph+6, pw/2, 5, 0, 0, Math.PI*2); ctx.fill();

  // Legs
  ctx.fillStyle='#2c2c6c';
  ctx.fillRect(px+6, py+ph-18+bodyBob, 10, 18+legOff);
  ctx.fillRect(px+pw-16, py+ph-18+bodyBob, 10, 18-legOff);
  // Boots
  ctx.fillStyle='#4a2800';
  ctx.fillRect(px+4, py+ph-4+bodyBob+legOff, 13, 8);
  ctx.fillRect(px+pw-17, py+ph-4+bodyBob-legOff, 13, 8);

  // Body / armor
  const ag = ctx.createLinearGradient(px,py+10,px+pw,py+ph);
  ag.addColorStop(0,'#8a9aaa'); ag.addColorStop(0.5,'#c8d8e8'); ag.addColorStop(1,'#6a7a8a');
  ctx.fillStyle=ag;
  ctx.fillRect(px+4, py+14+bodyBob, pw-8, ph-32);
  // Chest detail
  ctx.strokeStyle='#9ab0c0'; ctx.lineWidth=1.5;
  ctx.strokeRect(px+7, py+18+bodyBob, pw-14, ph-42);
  ctx.beginPath(); ctx.moveTo(px+pw/2,py+18+bodyBob); ctx.lineTo(px+pw/2,py+ph-18+bodyBob); ctx.stroke();

  // Cape
  ctx.fillStyle='#8b0000';
  ctx.beginPath();
  ctx.moveTo(px+pw-4,py+15+bodyBob);
  ctx.quadraticCurveTo(px+pw+10,py+ph/2, px+pw-2,py+ph-18+bodyBob);
  ctx.lineTo(px+pw-4,py+ph-16+bodyBob);
  ctx.quadraticCurveTo(px+pw+4,py+ph/2, px+pw-6,py+18+bodyBob);
  ctx.closePath(); ctx.fill();

  // Arms
  ctx.fillStyle='#8a9aaa';
  // sword arm
  ctx.save();
  ctx.translate(px+pw-2, py+18+bodyBob);
  ctx.rotate(armOff*0.04);
  ctx.fillRect(0,-2,8,20);
  // sword
  ctx.fillStyle='#c0c0d0';
  ctx.fillRect(6,-10,4,28);
  ctx.fillStyle='#c8a820';
  ctx.fillRect(2,10,12,5);
  ctx.restore();

  // shield arm
  ctx.fillStyle='#8a9aaa';
  ctx.save();
  ctx.translate(px+2, py+18+bodyBob);
  ctx.rotate(-armOff*0.04);
  ctx.fillRect(-8,-2,8,20);
  // shield
  ctx.fillStyle='#8b0000';
  ctx.beginPath(); ctx.moveTo(-14,2); ctx.lineTo(-6,-6); ctx.lineTo(2,2); ctx.lineTo(-1,16); ctx.lineTo(-10,16); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#f0c040'; ctx.font='10px serif'; ctx.fillText('⚔',-13,12);
  ctx.restore();

  // Head / helmet
  ctx.fillStyle='#b0c0d0';
  ctx.beginPath(); ctx.ellipse(px+pw/2, py+8+bodyBob, pw/2-3, 12, 0, 0, Math.PI*2); ctx.fill();
  // visor
  ctx.fillStyle='#2a2a3a';
  ctx.fillRect(px+8, py+6+bodyBob, pw-16, 8);
  // eyes glow
  ctx.fillStyle='#f0c040';
  ctx.beginPath(); ctx.ellipse(px+13, py+9+bodyBob, 3, 2.5, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(px+pw-13, py+9+bodyBob, 3, 2.5, 0, 0, Math.PI*2); ctx.fill();
  // plume
  ctx.strokeStyle='#c0392b'; ctx.lineWidth=3;
  ctx.beginPath();
  ctx.moveTo(px+pw/2, py-2+bodyBob);
  for(let i=0;i<4;i++) ctx.lineTo(px+pw/2+(i%2?4:-4), py-8-i*4+bodyBob+Math.sin(frame*0.15)*2);
  ctx.stroke();

  ctx.restore();
}

// ── Particles ─────────────────────────────────────────────────
let particles = [];
function spawnParticles(x, y, color, count=8) {
  for(let i=0;i<count;i++) {
    const a = Math.random()*Math.PI*2, v = 2+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v-2,life:40,maxLife:40,color});
  }
}
function updateParticles() {
  particles = particles.filter(p => p.life>0);
  particles.forEach(p => {
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.2; p.life--;
    const alpha = p.life/p.maxLife;
    ctx.fillStyle = p.color.replace(')',`,${alpha})`).replace('rgb','rgba');
    ctx.beginPath(); ctx.arc(p.x,p.y,3*alpha,0,Math.PI*2); ctx.fill();
  });
}

// ── Score popup ───────────────────────────────────────────────
let popups = [];
function spawnPopup(x,y,text,color='#f0c040'){
  popups.push({x,y,text,color,life:50});
}
function updatePopups(){
  popups=popups.filter(p=>p.life>0);
  popups.forEach(p=>{
    p.y-=0.8; p.life--;
    ctx.globalAlpha=p.life/50;
    ctx.font='bold 14px Cinzel,serif';
    ctx.fillStyle=p.color;
    ctx.textAlign='center';
    ctx.fillText(p.text,p.x,p.y);
    ctx.globalAlpha=1;
  });
  ctx.textAlign='left';
}

// ── Main loop ─────────────────────────────────────────────────
let animRunning = false;
function loop() {
  if (!gameRunning) { animRunning=false; return; }
  requestAnimationFrame(loop);
  if (paused) {
    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.fillRect(0,0,W,H);
    ctx.font='2rem Cinzel,serif'; ctx.fillStyle='#f0c040'; ctx.textAlign='center';
    ctx.fillText('⏸ PAUSADO',W/2,H/2);
    ctx.font='1rem Cinzel,serif'; ctx.fillStyle='#aaa';
    ctx.fillText('Pressione P para continuar',W/2,H/2+36);
    ctx.textAlign='left';
    return;
  }

  frame++;

  // Speed / level ramp
  speed = 4 + Math.floor(score/200)*0.5;
  level = 1 + Math.floor(score/200);
  updateHUD();

  // Spawn
  spawnTimer--;
  const minInterval = Math.max(35, 90 - level*4);
  if (spawnTimer <= 0) { spawnEntity(); spawnTimer = minInterval + Math.random()*30; }

  // ── Draw background ────────────────────────────────────────
  drawSky();
  drawStars();
  drawMoon();
  drawClouds();
  drawCastle();
  drawTrees();
  drawGround();

  // ── Update & draw entities ────────────────────────────────
  entities = entities.filter(e => e.x+e.w > -20);
  entities.forEach(e => {
    e.x -= speed;
    if (e.kind === 'obstacle') {
      if (e.type === 'rock') drawRock(e);
      else if (e.type === 'torch') drawTorch(e);
      else drawFence(e);
      if (player.invincible === 0 && rectOverlap(player, e)) { hit(); }
    } else if (e.kind === 'mushroom') {
      drawMushroom(e);
      if (player.invincible === 0 && rectOverlap(player, e)) { hit(); e.x=-100; spawnParticles(e.x+15,e.y,'rgb(139,0,0)'); }
    } else if (e.kind === 'fruit') {
      drawFruit(e);
      if (rectOverlap(player, e, 2)) {
        score += e.pts;
        spawnParticles(e.x+14,e.y+14,'rgb(255,200,0)');
        spawnPopup(e.x+14,e.y,'+'+(e.pts));
        e.x=-100;
      }
    }
  });

  // ── Player physics ─────────────────────────────────────────
  if (!player.dead) {
    player.vy += 0.7;
    player.y += player.vy;
    if (player.y >= GROUND_Y) { player.y = GROUND_Y; player.vy = 0; player.jumping = false; player.doubleJump = false; }
    if (player.invincible > 0) player.invincible--;
  }

  drawPlayer();
  updateParticles();
  updatePopups();

  // Score (passive)
  if (frame % 10 === 0) { score += level; }

  // ── Ground sparkle ─────────────────────────────────────────
  if (Math.random()<0.12) {
    ctx.fillStyle=`rgba(255,220,80,${Math.random()*0.5})`;
    ctx.beginPath(); ctx.arc(Math.random()*W, H*0.65+Math.random()*4, 1.5, 0, Math.PI*2); ctx.fill();
  }
}

function hit() {
  lives--;
  player.invincible = 120;
  spawnParticles(player.x+player.w/2, player.y+player.h/2, 'rgb(200,0,0)', 12);
  updateHUD();
  if (lives <= 0) endGame();
}

function endGame() {
  gameRunning = false;
  if (score > bestScore) bestScore = score;
  document.getElementById('final-score').textContent = score;
  document.getElementById('best-score').textContent = bestScore;
  const go = document.getElementById('game-over-screen');
  go.style.display = 'flex';
}
</script>
